set -g mode-style "fg=#282828,bg=#d79921,bold"
set -g message-style "fg=#fbf1c7,bg=#3c3836"
set -g message-command-style "fg=#fbf1c7,bg=#3c3836"
set -g pane-border-style "fg=#665c54"
set -g pane-active-border-style "fg=#d65d0e"
set -g clock-mode-colour "#d65d0e"
set -g display-panes-colour "#665c54"
set -g display-panes-active-colour "#d65d0e"
set -g status-style "fg=#fbf1c7,bg=#1e2021"
set -g status-left-length 24
set -g status-right-length 80
set -g status-left "#[fg=#282828,bg=#d65d0e,bold] #S #[fg=#d65d0e,bg=#1e2021,nobold]"
set -g status-right "#[fg=#7c6f64,bg=#1e2021]#{?client_prefix,#[fg=#cc241d]PREFIX #[fg=#7c6f64],} %Y-%m-%d %H:%M "
set -g window-status-separator ""
set -g window-status-format "#[fg=#7c6f64,bg=#1e2021] #I #W "
set -g window-status-current-format "#[fg=#282828,bg=#458588,bold] #I #W "
set -g window-status-activity-style "fg=#d79921,bg=#1e2021"
set -g window-status-bell-style "fg=#cc241d,bg=#1e2021,bold"
set -g window-status-last-style "fg=#bdae93,bg=#1e2021"

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
# A minimal left prompt
format = """$directory$character"""
palette = "minimal_dark"
# move the rest of the prompt to the right
right_format = """$all"""
command_timeout = 1000

[character]
vicmd_symbol = "[N] >>>"
success_symbol = '[➜](bold green)'

[git_branch]
format =  '[$symbol$branch(:$remote_branch)]($style)'

[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = false
style = 'bold blue'
symbol = " "

[golang]
format = '[ ](bold cyan)'

[docker_context]
disabled = true

[palettes.minimal_dark]
accent = "#d65d0e"
red = "#cc241d"
orange = "#d65d0e"
yellow = "#d79921"
green = "#98971a"
cyan = "#689d6a"
blue = "#458588"
purple = "#b16286"
text = "#fbf1c7"
subtext1 = "#bdae93"
subtext0 = "#7c6f64"
surface1 = "#504945"
surface0 = "#3c3836"
base = "#282828"
